<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffe6ef,#fff8fb);
overflow:hidden;
}

/* Floating Hearts */

.hearts{
position:fixed;
inset:0;
pointer-events:none;
}

.heart{
position:absolute;
animation:float 6s linear forwards;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120px);
opacity:0;
}

}

/* Envelope */

.envelope{
position:relative;
width:220px;
height:140px;
background:#ff8fb1;
border-radius:8px;
margin-bottom:30px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.envelope::before{
content:"";
position:absolute;
top:0;
left:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-top:75px solid #ffb6c9;
}

/* Buttons */

.buttons{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:14px 22px;
border:none;
border-radius:30px;
background:#ff4f88;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

/* Letter */

#note{
display:none;
margin-top:30px;
width:340px;
background:white;
padding:25px;
border-radius:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.15);
animation:pop .4s ease;
}

@keyframes pop{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

#note h2{
color:#ff4f88;
margin-bottom:15px;
}

#note p{
line-height:1.7;
color:#555;
font-size:17px;
}

</style>
</head>

<body>

<div class="hearts"></div>

<div class="envelope"></div>

<div class="buttons">

<button id="yesBtn">
💖 Yes, I wanna talk to you
</button>

<button id="noBtn">
🥺 No, I don't wanna talk to you
</button>

</div>

<div id="note"></div>

<script>

// Floating Hearts

const hearts=document.querySelector(".hearts");

function createHeart(){

const heart=document.createElement("div");

const emojis=["❤️","💕","💖","💗","💘"];

heart.className="heart";

heart.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(18+Math.random()*20)+"px";

heart.style.animationDuration=(4+Math.random()*3)+"s";

hearts.appendChild(heart);

setTimeout(()=>{

heart.remove();

},7000);

}

setInterval(createHeart,350);


// Buttons

const yes=document.getElementById("yesBtn");
const no=document.getElementById("noBtn");
const note=document.getElementById("note");

yes.onclick=function(){

note.style.display="block";

note.innerHTML=`

<h2>🥹❤️</h2>

<p>

<b>Attention, Mr. Shiraz! 🚨</b>

<br><br>

Good choice! 💕

<br><br>

But before we begin our very important conversation...

<br><br>

I believe someone owes Maham a tiny apology. 🤏🥺

<br><br>

One sincere <b>"I'm sorry"</b>, one warm hug, and all charges against you will be dropped. 🤍

<br><br>

Alsooooo... 😤💕

<br><br>

<b>I literally made this whole website just for you!</b>

<br><br>

Just look at my effortssssss, sirrrrrrrr. 🥹❤️

<br><br>

I spent my time making something special just to make you smile.

The least you can do is come back, apologize, and admire my coding skills. 😌💻💕

<br><br>

Now come back because someone has been waitingggggggggg for you. 🥺❤️

<br><br>

Love,

<b>Maham 🤍</b>

</p>
`;

}

no.onclick=function(){

note.style.display="block";

note.innerHTML=`

<h2>😤❤️</h2>

<p>

Nope!!

<br><br>

That isn't actually one of your choices.

<br><br>

You're talking to me anyway because I miss you way too much.

<br><br>

Now come here, apologize, and let me love you. 🥺💕

</p>

`;

}

</script>

</body>
</html>
