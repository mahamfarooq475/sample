<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Shiraz ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffe6ef,#fff8fb);
overflow:hidden;
}

/* Floating Hearts */

.hearts{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
animation:float 6s linear forwards;
}

@keyframes float{

0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-150px) scale(1.2);
opacity:0;
}

}

/* Envelope */

.envelope{

position:relative;

width:270px;

height:170px;

background:#ff8fb1;

border-radius:10px;

margin-bottom:30px;

box-shadow:0 12px 25px rgba(0,0,0,.18);

display:flex;

justify-content:center;

align-items:center;

}

.envelope::before{

content:"";

position:absolute;

top:0;

left:0;

border-left:135px solid transparent;

border-right:135px solid transparent;

border-top:90px solid #ffb6c9;

}

.envelope-text{

position:relative;

z-index:2;

color:white;

font-weight:bold;

text-align:center;

line-height:1.6;

padding:18px;

}

/* Buttons */

.buttons{

display:flex;

gap:15px;

flex-wrap:wrap;

justify-content:center;

}

button{

padding:14px 22px;

border:none;

border-radius:35px;

background:#ff4f88;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

box-shadow:0 6px 15px rgba(255,79,136,.3);

}

button:hover{

transform:scale(1.06);

}

/* Note */

#note{

display:none;

position:relative;

margin-top:30px;

width:430px;

max-width:90%;

max-height:400px;

overflow-y:auto;

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

text-align:center;

animation:popup .4s ease;

}

@keyframes popup{

from{

transform:scale(.8);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}

#note h2{

color:#ff4f88;

margin-bottom:15px;

}

#note p{

font-size:17px;

line-height:1.8;

color:#555;

}

.close{

position:absolute;

top:12px;

right:18px;

font-size:22px;

cursor:pointer;

color:#ff4f88;

font-weight:bold;

}
  #txt{
    
    padding:10px 22px;

border:none;
  }

</style>

</head>
<body>

<div class="hearts"></div>

<div class="envelope" >

<div class="envelope-text">
  
<h3 id="txt"> choose one <h3/>

</div>

</div>

<div class="buttons">

<button id="yesBtn">

💖  wanna talk

</button>

<button id="noBtn">

🥺 don't wanna talk 

</button>

</div>

<div id="note"></div>

<script>
  // Floating Hearts

const hearts = document.querySelector(".hearts");

function createHeart(){

const heart = document.createElement("div");

const emojis = ["❤️","💕","💖","💗","💘"];

heart.className = "heart";

heart.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

heart.style.left = Math.random()*100 + "vw";

heart.style.fontSize = (18 + Math.random()*20) + "px";

heart.style.animationDuration = (4 + Math.random()*3) + "s";

hearts.appendChild(heart);

setTimeout(function(){

heart.remove();

},7000);

}

setInterval(createHeart,350);


// Buttons

const yes = document.getElementById("yesBtn");
const no = document.getElementById("noBtn");
const note = document.getElementById("note");

yes.onclick = function(){

note.style.display = "block";

note.innerHTML = `

<div class="close" onclick="document.getElementById('note').style.display='none'">✖</div>

<h2>🥹❤️</h2>

<p>

<b>Attention, Mr. Shiraz! 🚨</b>

<br><br>

Good choice!! 💕

<br><br>

But before we begin our very important conversation...

<br><br>

I believe someone owes me a tiny apology. 🤏🥺

<br><br>

One sincere <b>"I'm sorry"</b> 🤍

<br><br>

Alsooooo... 😤💕

<br><br>

<b>I literally made this whole website just for you!!</b>

<br><br>

Just look at my effortssssss, sirrrrrrrr. 🥹❤️

<br><br>

I spent my time making something special just to make you smile.

The least you can do is come back, apologize, admire my coding skills, and give me the biggest hug. 😌💻💕

<br><br>

I've been waitingggggggggg for you.

<br><br>

So don't make your future wife wait any longer. 🥺❤️

<br><br>

Love,

<br><br>

<b>Maham 🤍</b>

</p>

`;

}


no.onclick = function(){

note.style.display = "block";

note.innerHTML = `

<div class="close" onclick="document.getElementById('note').style.display='none'">✖</div>

<h2>😤❤️</h2>

<p>

<b>Attention, Mr. Shiraz! 🚨</b>

<br><br>

Nice try... 😌

<br><br>

But that wasn't actually a choice.

<br><br>

You're still talking to Maham because she has been waitingggggggggg for you. 🥺💕

<br><br>

And excuse me...

<br><br>

<b>I MADE YOU A WHOLE WEBSITE!! 😭❤️</b>

<br><br>

Just look at my effortssssss, sirrrrrrrr.

<br><br>

You really thought you could press "No" after all this? 😂

<br><br>

Absolutely not.

<br><br>

Now stop being stubborn.

<br>

Come back.

<br>

and Apologize.

<br>

<br><br>

Love,

<br><br>

<b>Maham ❤️</b>

</p>

`;

}

</script>

</body>

</html>
