<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Message 💌</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#ffeef5);
overflow:hidden;
}

.container{
text-align:center;
position:relative;
}

.envelope{
width:260px;
height:170px;
background:#ff8fb1;
border-radius:10px;
position:relative;
margin:auto;
box-shadow:0 15px 35px rgba(0,0,0,.15);
transition:.8s;
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:130px solid transparent;
border-right:130px solid transparent;
border-top:90px solid #ffb6c9;
transform-origin:top;
transition:1s;
z-index:5;
}

.open .envelope:before{
transform:rotateX(180deg);
}

.button{
margin-top:25px;
padding:12px 28px;
border:none;
border-radius:30px;
background:#ff4f81;
color:white;
font-size:17px;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 18px rgba(255,79,129,.4);
}

.button:hover{
transform:scale(1.08);
}

.letter{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%) translateY(40px);
width:230px;
padding:25px;
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
opacity:0;
transition:1s;
z-index:2;
}

.open .letter{
opacity:1;
transform:translateX(-50%) translateY(-120px);
}

h2{
color:#ff4f81;
margin-bottom:12px;
}

p{
color:#555;
font-size:16px;
line-height:1.6;
}

.hearts{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
font-size:24px;
animation:float 6s linear infinite;
opacity:.8;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120px) scale(1.2);
opacity:0;
}
}
</style>

</head>

<body>

<div class="hearts"></div>

<div class="container" id="container">

<div class="letter">
<h2>Hi My Love ❤️</h2>

<p>
I have been waiting... 🥺
<br><br>
Not for flowers.
<br>
Not for chocolates.
<br><br>
Just for one tiny little thing...
<br><br>
<b>Your apology. ❤️</b>
<br><br>
I'll be right here whenever you're ready.
<br><br>
I love you. 💕
</p>

</div>

<div class="envelope"></div>

<button class="button" onclick="openLetter()">
💌 Click Me
</button>

</div>

<script>

function openLetter(){
document.getElementById("container").classList.add("open");
document.querySelector(".button").style.display="none";
}

const hearts=document.querySelector(".hearts");

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML=["❤️","💖","💕","💗"][Math.floor(Math.random()*4)];
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+4)+"s";
heart.style.fontSize=(Math.random()*18+18)+"px";
hearts.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
