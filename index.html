<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Button</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial,sans-serif;
    background:#ffe6ef;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:#ff4f88;
    color:white;
    cursor:pointer;
}

#note{
    margin-top:30px;
    font-size:30px;
    color:#ff4f88;
    display:none;
}
</style>

</head>

<body>

<button id="btn">Click Me ❤️</button>

<div id="note">Hello! 👋💕</div>

<script>

const btn = document.getElementById("btn");
const note = document.getElementById("note");

btn.addEventListener("click", function(){

    note.style.display = "block";

});

</script>

</body>
</html>
