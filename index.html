<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#fff5fa);
    overflow:hidden;
}

.container{
    position:relative;
    text-align:center;
}

.envelope{
    width:280px;
    height:180px;
    background:#ff8fb1;
    border-radius:10px;
    position:relative;
    margin:auto;
    box-shadow:0 15px 30px rgba(0,0,0,.15);
}

.envelope::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:0;
    height:0;
    border-left:140px solid transparent;
    border-right:140px solid transparent;
    border-top:95px solid #ffb6c9;
    transform-origin:top;
    transition:1s;
    z-index:5;
}

.open .envelope::before{
    transform:rotateX(180deg);
}

.letter{
    position:absolute;
    width:250px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    left:50%;
    top:40px;
    transform:translateX(-50%);
    opacity:0;
    transition:1s;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    z-index:2;
}

.open .letter{
    opacity:1;
    transform:translate(-50%,-150px);
}

.letter h2{
    color:#ff4d88;
    margin-bottom:15px;
}

.letter p{
    color:#555;
    line-height:1.7;
}

.button{
    margin-top:30px;
    padding:13px 35px;
    border:none;
    border-radius:30px;
    background:#ff4d88;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
    position:relative;
    z-index:20;
}

.button:hover{
    transform:scale(1.08);
}

.hearts{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

.heart{
    position:absolute;
    animation:float 6s linear forwards;
}

@keyframes float{

0%{
    transform:translateY(100vh) scale(.5);
    opacity:0;
}

20%{
    opacity:1;
}

100%{
    transform:translateY(-150px) scale(1.3);
    opacity:0;
}

}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="container" id="container">

<div class="letter">
<h2>Hi My Love ❤️</h2>

<p>
I've been checking my inbox... 🥺
<br><br>

Still waiting for one very special message...

<br><br>

<b>Your apology. 💌</b>

<br><br>

I'll happily accept it with the biggest smile. ❤️

<br><br>

I miss you.
</p>

</div>

<div class="envelope"></div>

<button class="button" id="openBtn">
💌 Click Me
</button>

</div>

<script>

const btn=document.getElementById("openBtn");
const container=document.getElementById("container");
const hearts=document.querySelector(".hearts");

btn.addEventListener("click",function(){

container.classList.add("open");

btn.style.display="none";

});

function createHeart(){

const heart=document.createElement("div");

const emojis=["❤️","💕","💖","💗","💘"];

heart.classList.add("heart");

heart.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(18+Math.random()*20)+"px";

heart.style.animationDuration=(4+Math.random()*3)+"s";

hearts.appendChild(heart);

setTimeout(function(){

heart.remove();

},7000);

}

setInterval(createHeart,350);

</script>

</body>
</html>
