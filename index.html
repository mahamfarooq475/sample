<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6e7,#fff5fa);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    position:relative;
}

.envelope{
    width:280px;
    height:180px;
    background:#ff8fb1;
    border-radius:8px;
    position:relative;
    margin:auto;
    overflow:visible;
}

.flap{
    position:absolute;
    top:0;
    left:0;
    width:0;
    height:0;
    border-left:140px solid transparent;
    border-right:140px solid transparent;
    border-top:95px solid #ffb6c9;
    transform-origin:top;
    transition:1s;
    z-index:2;
}

.open .flap{
    transform:rotateX(180deg);
}

.letter{
    position:absolute;
    left:50%;
    top:20px;
    transform:translateX(-50%);
    width:240px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
    opacity:0;
    transition:1s;
    z-index:1;
}

.open .letter{
    opacity:1;
    transform:translate(-50%,-170px);
}

h2{
    color:#ff4f88;
    margin-bottom:15px;
}

p{
    color:#555;
    line-height:1.7;
}

button{
    margin-top:30px;
    padding:14px 35px;
    border:none;
    border-radius:40px;
    background:#ff4f88;
    color:white;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.hearts{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.heart{
    position:absolute;
    animation:float 6s linear forwards;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-150px);
opacity:0;
}

}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="container" id="container">

<div class="letter">
<h2>Hi My Love ❤️</h2>

<p>
I've been checking my inbox... 🥺

<br><br>

Still waiting for one very special message...

<br><br>

<strong>Your apology. 💌</strong>

<br><br>

I'll happily accept it with the biggest smile.

<br><br>

I love you. ❤️
</p>

</div>

<div class="envelope">
<div class="flap"></div>
</div>

<button id="openBtn">💌 Click Me</button>

</div>

<script>

const btn=document.getElementById("openBtn");
const container=document.getElementById("container");
const hearts=document.querySelector(".hearts");

btn.onclick=function(){

container.classList.add("open");

btn.style.display="none";

};

function heart(){

const h=document.createElement("div");

const emojis=["❤️","💕","💖","💗","💘"];

h.className="heart";

h.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*20)+"px";

h.style.animationDuration=(4+Math.random()*3)+"s";

hearts.appendChild(h);

setTimeout(function(){

h.remove();

},7000);

}

setInterval(heart,300);

</script>

</body>
</html>
